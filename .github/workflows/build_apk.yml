name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sistem bagimliklarini kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip python3-pip \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev libreadline-dev libbz2-dev \
            zlib1g-dev autoconf libtool pkg-config \
            cmake libltdl-dev libgdbm-dev aidl

      - name: Android SDK lisanslarini kabul et
        run: |
          ANDROID_SDK=$ANDROID_SDK_ROOT
          mkdir -p "$ANDROID_SDK/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_SDK/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$ANDROID_SDK/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> "$ANDROID_SDK/licenses/android-sdk-license"
          yes | sdkmanager --sdk_root="$ANDROID_SDK" --licenses || true
          sdkmanager --sdk_root="$ANDROID_SDK" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;28.0.13004108"

      - name: Buildozer ve Cython kur
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: APK Derle
        env:
          ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
          ANDROIDNDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.0.13004108
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"
        run: |
          buildozer -v android debug 2>&1

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: AtikAvcisi-APK
          path: bin/*.apk
